name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to receive the Windows portable exe
        required: false
        type: string
        default: v0.1.9-beta
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-portable:
    name: Windows portable build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run checks
        run: npm run check

      - name: Build Windows portable app
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalAid-windows-portable
          path: dist/desktop/*.exe
          if-no-files-found: error

      - name: Publish Windows release asset
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        shell: pwsh
        run: |
          $asset = Get-ChildItem -Path dist/desktop -Filter '*.exe' | Select-Object -First 1
          if (-not $asset) {
            throw "No Windows portable exe was built."
          }

          if (-not $env:RELEASE_TAG) {
            Write-Host "No release tag was provided; skipping release upload."
            exit 0
          }

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            $releaseCreateArgs = @(
              "release",
              "create",
              $env:RELEASE_TAG,
              "--repo",
              $env:GITHUB_REPOSITORY,
              "--title",
              "GalAid $($env:RELEASE_TAG)",
              "--generate-notes"
            )

            if ($env:RELEASE_TAG -match "(?i)(alpha|beta|rc)") {
              $releaseCreateArgs += "--prerelease"
            }

            & gh @releaseCreateArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Could not create GitHub release $($env:RELEASE_TAG)."
            }
          }

          $release = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json assets | ConvertFrom-Json
          foreach ($item in $release.assets) {
            if ($item.name -like 'GalAid-*-win-x64.exe' -and $item.name -ne $asset.Name) {
              gh release delete-asset $env:RELEASE_TAG $item.name -y --repo $env:GITHUB_REPOSITORY
            }
          }

          gh release upload $env:RELEASE_TAG $asset.FullName --clobber --repo $env:GITHUB_REPOSITORY
